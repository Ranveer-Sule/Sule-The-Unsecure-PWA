{% extends 'layout.html' %}
{% block content %}
<h1>Enter your 6-digit code</h1>
{% if msg %}<p>{{ msg }}</p>{% endif %}
<form action="/verify_2fa" method="POST" class="box">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="text" name="otp" maxlength="16"
       pattern="[A-Za-z0-9]{6,16}"
       autocomplete="off"
       placeholder="Authenticator code or recovery code"
       aria-label="Authenticator code or recovery code"
       class="input__field" required>
    <button type="submit" class="btn">Verify</button>
</form>
{% endblock %}
