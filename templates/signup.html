{% extends 'layout.html' %}
{% block content %}
<h1>Signup Form</h1>
<form action="/signup.html" method="POST" class="box">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="input__wrapper">
    <input type="text" name="username" placeholder="Username" class="input__field"
               required maxlength="20" minlength="3" pattern="[A-Za-z0-9_]{3,20}"
               autocomplete="off"
       title="3-20 characters: letters, numbers or underscore only">
    </div>            
    <div class="input__wrapper">
    <input type="password" name="password" placeholder="Password" class="input__field"
       required minlength="8" maxlength="64"
       autocomplete="new-password">
    </div>
    <div class="input__wrapper">
        <input type="date" name="dob" placeholder="Date of Birth" class="input__field" required max = "{{ max_dob }}">
    </div>
    <p>By signing up, you agree to our <a href="/privacy">Privacy Policy</a>.</p>
    <div class="input__wrapper">
        <button type="submit" class="btn">Submit</button>
    </div>
</form>
{% endblock %}
